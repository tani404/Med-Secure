<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)" rx="12"/>
  <!-- Truck body -->
  <rect x="80" y="110" width="180" height="80" fill="#444" rx="4"/>
  <rect x="260" y="130" width="80" height="60" fill="#555" rx="4"/>
  <!-- Truck cab window -->
  <rect x="270" y="138" width="55" height="30" fill="#bbb" rx="3"/>
  <!-- Wheels -->
  <circle cx="140" cy="200" r="18" fill="#333"/>
  <circle cx="140" cy="200" r="8" fill="#777"/>
  <circle cx="220" cy="200" r="18" fill="#333"/>
  <circle cx="220" cy="200" r="8" fill="#777"/>
  <circle cx="310" cy="200" r="18" fill="#333"/>
  <circle cx="310" cy="200" r="8" fill="#777"/>
  <!-- Cross symbol on truck -->
  <rect x="155" y="135" width="30" height="8" fill="#f0f0f0" rx="2"/>
  <rect x="166" y="124" width="8" height="30" fill="#f0f0f0" rx="2"/>
  <!-- Road -->
  <rect x="0" y="215" width="400" height="25" fill="#555"/>
  <rect x="30" y="225" width="40" height="4" fill="#fff" rx="2"/>
  <rect x="110" y="225" width="40" height="4" fill="#fff" rx="2"/>
  <rect x="190" y="225" width="40" height="4" fill="#fff" rx="2"/>
  <rect x="270" y="225" width="40" height="4" fill="#fff" rx="2"/>
  <rect x="350" y="225" width="40" height="4" fill="#fff" rx="2"/>
  <!-- GPS signal waves -->
  <circle cx="170" cy="90" r="12" fill="none" stroke="#888" stroke-width="2" opacity="0.6"/>
  <circle cx="170" cy="90" r="22" fill="none" stroke="#888" stroke-width="2" opacity="0.4"/>
  <circle cx="170" cy="90" r="32" fill="none" stroke="#888" stroke-width="2" opacity="0.2"/>
  <circle cx="170" cy="90" r="4" fill="#888"/>
  <!-- Route dots -->
  <circle cx="40" cy="70" r="5" fill="#999" opacity="0.4"/>
  <circle cx="60" cy="55" r="5" fill="#999" opacity="0.5"/>
  <circle cx="85" cy="48" r="5" fill="#999" opacity="0.6"/>
  <line x1="40" y1="70" x2="60" y2="55" stroke="#999" stroke-width="1.5" opacity="0.3"/>
  <line x1="60" y1="55" x2="85" y2="48" stroke="#999" stroke-width="1.5" opacity="0.3"/>
</svg>