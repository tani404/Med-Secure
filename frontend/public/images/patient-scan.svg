<svg xmlns="http://www.w3.org/2000/svg" width="400" height="240" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)" rx="12"/>
  <!-- Phone -->
  <rect x="140" y="30" width="120" height="190" fill="#444" rx="12"/>
  <rect x="148" y="45" width="104" height="155" fill="#bbb" rx="4"/>
  <!-- Phone notch -->
  <rect x="175" y="34" width="50" height="6" fill="#555" rx="3"/>
  <!-- QR Code on phone screen -->
  <rect x="170" y="70" width="60" height="60" fill="#444"/>
  <rect x="175" y="75" width="14" height="14" fill="#f0f0f0"/>
  <rect x="195" y="75" width="6" height="6" fill="#f0f0f0"/>
  <rect x="205" y="75" width="14" height="14" fill="#f0f0f0"/>
  <rect x="175" y="95" width="6" height="6" fill="#f0f0f0"/>
  <rect x="185" y="95" width="6" height="6" fill="#f0f0f0"/>
  <rect x="195" y="95" width="6" height="6" fill="#f0f0f0"/>
  <rect x="205" y="95" width="6" height="6" fill="#f0f0f0"/>
  <rect x="215" y="95" width="6" height="6" fill="#f0f0f0"/>
  <rect x="175" y="105" width="14" height="14" fill="#f0f0f0"/>
  <rect x="195" y="105" width="6" height="6" fill="#f0f0f0"/>
  <rect x="215" y="105" width="6" height="6" fill="#f0f0f0"/>
  <!-- Verification result on screen -->
  <circle cx="200" cy="155" r="15" fill="#666"/>
  <polyline points="192,155 198,161 210,149" fill="none" stroke="#f0f0f0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="170" y="178" width="60" height="6" fill="#888" rx="2"/>
  <rect x="180" y="190" width="40" height="5" fill="#999" rx="2"/>
  <!-- Scan lines emanating from phone -->
  <line x1="148" y1="100" x2="80" y2="80" stroke="#888" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="148" y1="100" x2="80" y2="100" stroke="#888" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="148" y1="100" x2="80" y2="120" stroke="#888" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- Medicine box being scanned -->
  <rect x="40" y="70" width="45" height="60" fill="#666" rx="4"/>
  <rect x="48" y="78" width="29" height="8" fill="#999" rx="2"/>
  <rect x="48" y="92" width="20" height="5" fill="#888" rx="1"/>
  <rect x="48" y="102" width="25" height="5" fill="#888" rx="1"/>
  <!-- NFC waves -->
  <path d="M 300 100 Q 320 80, 340 100" fill="none" stroke="#888" stroke-width="2" opacity="0.3"/>
  <path d="M 295 105 Q 320 75, 345 105" fill="none" stroke="#888" stroke-width="2" opacity="0.2"/>
  <path d="M 290 110 Q 320 70, 350 110" fill="none" stroke="#888" stroke-width="2" opacity="0.1"/>
  <!-- Hand silhouette -->
  <rect x="165" y="210" width="70" height="30" fill="#555" rx="8"/>
</svg>