  <rect x="224" y="150" width="64" height="180" rx="8" fill="white" opacity="0.95"/>
  <rect x="176" y="208" width="160" height="64" rx="8" fill="white" opacity="0.95"/>

  <!-- Blockchain chain links -->
  <rect x="142" y="368" width="44" height="24" rx="12" fill="none" stroke="url(#chainGradW)" stroke-width="3.5"/>
  <rect x="196" y="368" width="44" height="24" rx="12" fill="none" stroke="url(#chainGradW)" stroke-width="3.5"/>
  <rect x="272" y="368" width="44" height="24" rx="12" fill="none" stroke="url(#chainGradW)" stroke-width="3.5"/>
  <rect x="326" y="368" width="44" height="24" rx="12" fill="none" stroke="url(#chainGradW)" stroke-width="3.5"/>

  <!-- Chain connectors -->
  <line x1="186" y1="380" x2="196" y2="380" stroke="white" stroke-width="3" opacity="0.8"/>
  <line x1="240" y1="380" x2="272" y2="380" stroke="white" stroke-width="3" opacity="0.8"/>
  <line x1="316" y1="380" x2="326" y2="380" stroke="white" stroke-width="3" opacity="0.8"/>
